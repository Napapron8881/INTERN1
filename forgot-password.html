<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ลืมรหัสผ่าน</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(
135deg,
#143a75,
#3b82f6
);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.box{
background:white;
width:90%;
max-width:500px;
padding:40px;
border-radius:25px;
box-shadow:0 20px 80px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#0b4ea2;
margin-bottom:25px;
}

input{
width:100%;
height:55px;
padding:0 15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:12px;
box-sizing:border-box;
}

button{
width:100%;
height:55px;
border:none;
border-radius:12px;
background:#0b4ea2;
color:white;
font-size:16px;
cursor:pointer;
}

.back{
margin-top:10px;
background:#e0e0e0;
color:#333;
}

</style>

</head>

<body>

<div class="box">

<h1>ลืมรหัสผ่าน</h1>

<input
type="email"
placeholder="อีเมลที่ลงทะเบียนไว้"
>

<button>
ส่ง OTP
</button>

<hr style="margin:25px 0;">

<input
type="text"
placeholder="OTP"
>

<input
type="password"
placeholder="รหัสผ่านใหม่"
>

<input
type="password"
placeholder="ยืนยันรหัสผ่านใหม่"
>

<button>
บันทึกรหัสผ่านใหม่
</button>

<button
class="back"
onclick="window.location.href='index.html'"
>
กลับหน้าเข้าสู่ระบบ
</button>

</div>

</body>
</html>
