<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ลงทะเบียนผู้ใช้งาน</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#143a75,#3b82f6);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  width:90%;
  max-width:550px;
  padding:40px;
  border-radius:25px;
  box-shadow:0 20px 70px rgba(0,0,0,.2);
}

h1{
  text-align:center;
  color:#0b4ea2;
  margin-bottom:25px;
}

input{
  width:100%;
  height:55px;
  margin-bottom:15px;
  padding:0 15px;
  border:1px solid #ddd;
  border-radius:12px;
  box-sizing:border-box;
}

button{
  width:100%;
  height:55px;
  border:none;
  border-radius:12px;
  background:#0b4ea2;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.back{
  margin-top:10px;
  background:#e0e0e0;
  color:#333;
}

</style>

</head>

<body>

<div class="box">

<h1>ลงทะเบียนผู้ใช้งาน</h1>

<input
type="text"
id="username"
placeholder="Username *"
required
>

<input
type="text"
id="firstname"
placeholder="ชื่อ"
required
>

<input
type="text"
id="lastname"
placeholder="นามสกุล"
required
>

<input
type="text"
id="nickname"
placeholder="ชื่อเล่น"
>

<input
type="email"
id="email"
placeholder="อีเมล"
required
>

<input
type="tel"
id="phone"
placeholder="เบอร์โทร"
required
>

<input
type="password"
id="password"
placeholder="รหัสผ่าน"
required
>

<input
type="password"
id="confirmPassword"
placeholder="ยืนยันรหัสผ่าน"
required
>

<button onclick="registerUser()">
ลงทะเบียน
</button>

<button
class="back"
onclick="window.location.href='index.html'"
>
กลับหน้าเข้าสู่ระบบ
</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw-VcSqb_SD74JmGuyBmrsQUC1sTWQfwS57j_qrThDmYbxqujx5lGki-WQoJ8p2UwH8Yg/exec";

function callAPI(params, callbackName){

  return new Promise(function(resolve, reject){

    const callback =
    callbackName + "_" + Date.now();

    params.callback = callback;

    const query =
    new URLSearchParams(params).toString();

    const script =
    document.createElement("script");

    window[callback] = function(data){
      resolve(data);
      delete window[callback];
      script.remove();
    };

    script.onerror = function(){
      reject();
      delete window[callback];
      script.remove();
    };

    script.src =
    API_URL + "?" + query;

    document.body.appendChild(script);

  });

}

function registerUser(){

  const password =
  document.getElementById("password").value;

  const confirmPassword =
  document.getElementById("confirmPassword").value;

  if(password !== confirmPassword){
    alert("รหัสผ่านไม่ตรงกัน");
    return;
  }

  callAPI({
    action:"register",
    username:document.getElementById("username").value,
    firstname:document.getElementById("firstname").value,
    lastname:document.getElementById("lastname").value,
    nickname:document.getElementById("nickname").value,
    email:document.getElementById("email").value,
    phone:document.getElementById("phone").value,
    password:password
  },"registerCallback")

.then(function(data){

  alert("ลงทะเบียนสำเร็จ");

  window.location.href =
  "index.html";

})

.catch(function(error){

  console.log(error);

});
  
}

</script>

</body>
</html>
