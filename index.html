<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INTERN 1</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Prompt',sans-serif;
background:linear-gradient(135deg,#143a75,#3b82f6);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card{
width:100%;
max-width:550px;
background:#fff;
padding:45px;
border-radius:30px;
box-shadow:0 25px 80px rgba(0,0,0,.18);
}

.logo{
width:100px;
height:100px;
border-radius:50%;
background:#2d74da;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
color:white;
font-size:38px;
font-weight:700;
}

h1{
text-align:center;
font-size:52px;
margin-top:20px;
color:#0b4ea2;
}

.subtitle{
text-align:center;
margin-top:10px;
margin-bottom:35px;
color:#777;
line-height:1.8;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input{
width:100%;
height:58px;
border:1px solid #ddd;
border-radius:15px;
padding:0 18px;
font-size:16px;
margin-bottom:20px;
}

input:focus{
outline:none;
border-color:#0b4ea2;
box-shadow:0 0 0 4px rgba(11,78,162,.12);
}

.login-btn{
width:100%;
height:58px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#0b4ea2,#4a94ff);
color:#fff;
font-size:18px;
font-weight:600;
cursor:pointer;
}

.login-btn:hover{
transform:translateY(-2px);
}

.links{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.links a{
text-decoration:none;
font-weight:600;
color:#0b4ea2;
}
</style>

</head>

<body>

<div class="login-card">

<div class="logo">
MED
</div>

<h1>INTERN 1</h1>

<p class="subtitle">
งานการศึกษา หลังปริญญา<br>
กลุ่มงานอายุรกรรม<br>
โรงพยาบาลพุทธชินราช พิษณุโลก
</p>

<label>Username / Email</label>

<input
type="email"
placeholder="example@hospital.com"
>

<label>Password</label>

<input
type="password"
placeholder="••••••••"
>

<button
class="login-btn"
onclick="window.location.href='dashboard.html'"
>
เข้าสู่ระบบ
</button>

<div class="links">

register.html
ลงทะเบียน
</a>

forgot-password.html
ลืมรหัสผ่าน
</a>

</div>

</div>

</body>
</html>
