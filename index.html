<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERN 1</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#123b7a,#3b82f6);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:90%;
max-width:550px;
padding:40px;
border-radius:30px;
box-shadow:0 20px 80px rgba(0,0,0,.2);
}

.logo{
width:100px;
height:100px;
border-radius:50%;
background:#2d74da;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:35px;
font-weight:bold;
}

h1{
text-align:center;
color:#0b4ea2;
}

p{
text-align:center;
color:#666;
}

input{
width:100%;
height:50px;
margin-bottom:15px;
padding:0 15px;
border:1px solid #ddd;
border-radius:12px;
}

button{
width:100%;
height:50px;
border:none;
border-radius:12px;
background:#0b4ea2;
color:white;
font-size:16px;
cursor:pointer;
}

.links{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.links a{
text-decoration:none;
color:#0b4ea2;
font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">
MED
</div>

<h1>INTERN 1</h1>

<p>
งานการศึกษา หลังปริญญา<br>
กลุ่มงานอายุรกรรม<br>
โรงพยาบาลพุทธชินราช พิษณุโลก
</p>

<input
type="text"
id="username"
placeholder="Username"
>

<input
type="password"
id="password"
placeholder="Password"
>

<button onclick="loginUser()">
เข้าสู่ระบบ
</button>

<div class="links"><a class="link-btn" href="register.html">ลงทะเบียน</a> <a class="link-btn" href="forgot-password.html">ลืมรหัสผ่าน</a> </div>
<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw-VcSqb_SD74JmGuyBmrsQUC1sTWQfwS57j_qrThDmYbxqujx5lGki-WQoJ8p2UwH8Yg/exec";

function callAPI(params, callbackName){

  return new Promise(function(resolve, reject){

    const callback =
    callbackName + "_" + Date.now();

    params.callback = callback;

    const query =
    new URLSearchParams(params).toString();

    const script =
    document.createElement("script");

    window[callback] = function(data){
      resolve(data);
      delete window[callback];
      script.remove();
    };

    script.onerror = function(){
      reject();
      delete window[callback];
      script.remove();
    };

    script.src =
    API_URL + "?" + query;

    document.body.appendChild(script);

  });

}

function loginUser(){

  const username =
  document.getElementById("username").value;

  const password =
  document.getElementById("password").value;

  callAPI({
    action:"login",
    username:username,
    password:password
  },"loginCallback")

.then(function(data){

    console.log(data);
    alert(JSON.stringify(data));

    if(data.success){

      localStorage.setItem(
        "currentUser",
        JSON.stringify(data.user)
      );

      window.location.href =
      "dashboard.html";

    }else{

      alert(data.message || "เข้าสู่ระบบไม่สำเร็จ");

    }

  })

  .catch(function(){
    alert("เชื่อมต่อระบบไม่ได้");
  });

}

</script>
</body>
</html>
