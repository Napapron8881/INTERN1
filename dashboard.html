<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f7fb;
}

.header{
  background:#0b4ea2;
  color:white;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.menu{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.menu button{
  background:#0b4ea2;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px 20px;
  cursor:pointer;
}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
  width:100%;
  height:45px;
  margin-bottom:10px;
  padding:0 10px;
  border:1px solid #ddd;
  border-radius:8px;
  box-sizing:border-box;
}

.save-btn{
  background:#28a745;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
  <h2 id="name">กำลังโหลดข้อมูล...</h2>
</div>

<div class="container">

  <div class="menu">

    <button onclick="showSection('evaluation')">
      📋 ตรวจสอบแบบประเมิน
    </button>

    <button onclick="showSection('profile')">
      👤 ข้อมูลส่วนตัว
    </button>

    <button onclick="showSection('password')">
      🔑 เปลี่ยนรหัสผ่าน
    </button>

    <button onclick="logout()">
      🚪 ออกจากระบบ
    </button>

  </div>

  <!-- ตรวจสอบแบบประเมิน -->
  <div id="evaluationSection">

    <div class="card">

      <h3>📋 ตรวจสอบแบบประเมิน</h3>

      <p>
        กำลังเตรียมเชื่อมข้อมูล Rotation 1 / Rotation 2 / Rotation 3
      </p>

    </div>

  </div>

  <!-- ข้อมูลส่วนตัว -->
  <div id="profileSection" style="display:none;">

    <div class="card">

      <h3>👤 ข้อมูลส่วนตัว</h3>

      <p>Username : <span id="profile_username"></span></p>

      <p>ชื่อ : <span id="profile_firstname"></span></p>

      <p>นามสกุล : <span id="profile_lastname"></span></p>

      <p>Email : <span id="profile_email"></span></p>

    </div>

  </div>
