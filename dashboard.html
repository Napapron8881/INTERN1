<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#0b4ea2;
color:white;
padding:20px;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.status-ok{
color:green;
font-weight:bold;
}

.status-no{
color:red;
font-weight:bold;
}

button{
background:#0b4ea2;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}
.menu{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.menu button{
width:auto;
padding:10px 20px;
}

</style>

</head>

<body>

<div class="header">

<h2 id="name">
กำลังโหลดข้อมูล...
</h2>

</div>

<div class="container">
  <div id="profileSection" style="display:none;">

<div class="card">

<h3>ข้อมูลส่วนตัว</h3>

<p>
Username :
<span id="profile_username"></span>
</p>

<p>
ชื่อ :
<span id="profile_firstname"></span>
</p>

<p>
นามสกุล :
<span id="profile_lastname"></span>
</p>

<p>
Email :
<span id="profile_email"></span>
</p>

</div>

</div>
  <div class="menu">

<button onclick="showSection('evaluation')">
📋 ตรวจสอบแบบประเมิน
</button>

<button onclick="showSection('profile')">
👤 ข้อมูลส่วนตัว
</button>

<button onclick="showSection('password')">
🔑 เปลี่ยนรหัสผ่าน
</button>

<button onclick="logout()">
🚪 ออกจากระบบ
</button>

</div>

<div class="card">

<div class="title">
ข้อมูลผู้ใช้งาน
</div>

<p id="userinfo"></p>

</div>

<div class="card">

<div class="title">
สถานะแบบประเมิน
</div>

<p class="status-no">
อยู่ระหว่างพัฒนา
</p>

</div>

<button onclick="logout()">
ออกจากระบบ
</button>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("currentUser")
);

if(!user){

  window.location.href =
  "index.html";

}

document.getElementById("name")
.innerHTML =
"สวัสดี " +
user.firstname +
" " +
user.lastname;

document.getElementById("userinfo")
.innerHTML =

"Username : " +
user.username +
"<br>" +

"Email : " +
user.email;

document.getElementById(
"profile_username"
).innerText = user.username;

document.getElementById(
"profile_firstname"
).innerText = user.firstname;

document.getElementById(
"profile_lastname"
).innerText = user.lastname;

document.getElementById(
"profile_email"
).innerText = user.email;

function showSection(section){

  const profile =
  document.getElementById(
    "profileSection"
  );

  if(section === "profile"){

    profile.style.display =
    "block";

  }else{

    profile.style.display =
    "none";

  }

}

function logout(){

  localStorage.removeItem(
    "currentUser"
  );

  window.location.href =
  "index.html";

}

</script>

</body>
</html>
