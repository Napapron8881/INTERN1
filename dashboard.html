<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#0b4ea2;
color:white;
padding:20px;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.status-ok{
color:green;
font-weight:bold;
}

.status-no{
color:red;
font-weight:bold;
}

button{
background:#0b4ea2;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<h2 id="name">
กำลังโหลดข้อมูล...
</h2>

</div>

<div class="container">

<div class="card">

<div class="title">
ข้อมูลผู้ใช้งาน
</div>

<p id="userinfo"></p>

</div>

<div class="card">

<div class="title">
สถานะแบบประเมิน
</div>

<p class="status-no">
อยู่ระหว่างพัฒนา
</p>

</div>

<button onclick="logout()">
ออกจากระบบ
</button>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("currentUser")
);

if(!user){

  window.location.href =
  "index.html";

}

document.getElementById("name")
.innerHTML =
"สวัสดี " +
user.firstname +
" " +
user.lastname;

document.getElementById("userinfo")
.innerHTML =

"Username : " +
user.username +
"<br>" +

"Email : " +
user.email;

function logout(){

  localStorage.removeItem(
    "currentUser"
  );

  window.location.href =
  "index.html";

}

</script>

</body>
</html>
